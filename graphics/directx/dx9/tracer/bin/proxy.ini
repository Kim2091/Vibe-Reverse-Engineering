[Trace]
; Number of frames to capture per trigger (default 2)
CaptureFrames=2
; Log Create* calls at boot for shader bytecodes (1=on, 0=off)
CaptureInit=1
; Which device call counts as a frame boundary for trigger-based capture.
; Default: Present. Some translated D3D8->D3D9 paths work better with EndScene.
FrameBoundary=Present

[Chain]
; Optional DLL to chain-load (e.g. another d3d9 wrapper)
; Leave empty to load system d3d9.dll directly.
DLL=
